<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Hackcrow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#030303;
    overflow:hidden;
    font-family:'Share Tech Mono', monospace;
    color:#00ff88;
}

/* =========================
   LOADER
========================= */

#loader{
    position:fixed;
    inset:0;
    background:#030303;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    overflow:hidden;
}

/* scanlines */

#loader::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );

    pointer-events:none;
    opacity:.15;
}

/* =========================
   LOADER GLITCH
========================= */

.glitch{
    position:relative;

    font-size:5rem;

    letter-spacing:10px;

    text-transform:uppercase;

    color:#00ff88;

    text-shadow:
        0 0 5px #00ff88,
        0 0 15px #00ff88,
        0 0 40px #00ff88;

    animation:
        textShake 1.5s infinite;

    margin-bottom:30px;
}

.glitch::before,
.glitch::after{

    content:"HACKCROW";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:#030303;

    overflow:hidden;

}

/* cyan */

.glitch::before{

    left:4px;

    text-shadow:-4px 0 #00d9ff;

    animation:
        glitchSlices1 0.7s infinite linear alternate-reverse;

}

/* purple */

.glitch::after{

    left:-4px;

    text-shadow:4px 0 #b026ff;

    animation:
        glitchSlices2 0.5s infinite linear alternate-reverse;

}

/* =========================
   INITIALIZING
========================= */

.init{

    font-size:1.2rem;

    margin-bottom:20px;

    letter-spacing:3px;

    text-shadow:0 0 10px #00ff88;

}

/* =========================
   PROGRESS BAR
========================= */

.progress-container{

    width:420px;

    height:30px;

    border:2px solid #00ff88;

    padding:4px;

    margin-bottom:15px;

    box-shadow:0 0 15px #00ff8850;

}

.progress-bar{

    height:100%;

    width:0%;

    background:#00ff88;

    box-shadow:0 0 20px #00ff88;

    transition:width .15s linear;

}

.percent{

    margin-bottom:25px;

    font-size:1.2rem;

}

/* =========================
   LOGS
========================= */

.logs{

    width:500px;

    height:180px;

    border:1px solid #00ff8840;

    padding:15px;

    overflow:hidden;

    background:rgba(0,255,136,.03);

    box-shadow:0 0 20px #00ff8820 inset;

}

.log{

    font-size:.95rem;

    margin-bottom:8px;

    opacity:0;

    animation:fadeIn .3s forwards;

}

@keyframes fadeIn{

    to{
        opacity:1;
    }

}

/* =========================
   TERMINAL BOX
========================= */

.terminal-box{

    margin-top:30px;

    color:#00ff88;

    font-size:1rem;

    line-height:1.6;

    text-shadow:0 0 8px #00ff88;

}

/* =========================
   MAIN CONTENT
========================= */

#mainContent{

    display:none;

    height:100vh;

    justify-content:center;

    align-items:center;

    background:#030303;

}

.show{
    display:flex !important;
}

/* =========================
   MAIN GLITCH
========================= */

.main-glitch{

    position:relative;

    font-size:5rem;

    letter-spacing:12px;

    color:#00ff88;

    text-transform:uppercase;

    text-shadow:
        0 0 5px #00ff88,
        0 0 15px #00ff88,
        0 0 40px #00ff88;

    animation:
        textShake 1.5s infinite;

}

/* capas */

.main-glitch::before,
.main-glitch::after{

    content:attr(data-text);

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:#030303;

    overflow:hidden;

}

/* cyan */

.main-glitch::before{

    left:4px;

    text-shadow:-4px 0 #00d9ff;

    animation:
        glitchSlices1 0.7s infinite linear alternate-reverse;

}

/* purple */

.main-glitch::after{

    left:-4px;

    text-shadow:4px 0 #b026ff;

    animation:
        glitchSlices2 0.5s infinite linear alternate-reverse;

}

/* =========================
   SHAKE
========================= */

@keyframes textShake{

    0%,100%{
        transform:translate(0);
    }

    10%{
        transform:translate(-2px,1px);
    }

    20%{
        transform:translate(2px,-1px);
    }

    30%{
        transform:translate(-5px,2px);
    }

    40%{
        transform:translate(5px,-2px);
    }

    50%{
        transform:translate(-3px,1px);
    }

    60%{
        transform:translate(3px,-1px);
    }

    70%{
        transform:translate(-6px,2px);
    }

    80%{
        transform:translate(6px,-2px);
    }

    90%{
        transform:translate(-2px,1px);
    }

}

/* =========================
   SLICES 1
========================= */

@keyframes glitchSlices1{

    0%{
        clip-path:inset(10% 0 80% 0);
        transform:translate(-20px,-10px);
    }

    10%{
        clip-path:inset(40% 0 30% 0);
        transform:translate(15px,5px);
    }

    20%{
        clip-path:inset(70% 0 5% 0);
        transform:translate(-10px,8px);
    }

    30%{
        clip-path:inset(15% 0 60% 0);
        transform:translate(25px,-5px);
    }

    40%{
        clip-path:inset(50% 0 20% 0);
        transform:translate(-30px,3px);
    }

    50%{
        clip-path:inset(80% 0 2% 0);
        transform:translate(20px,-8px);
    }

    60%{
        clip-path:inset(25% 0 45% 0);
        transform:translate(-25px,4px);
    }

    70%{
        clip-path:inset(60% 0 10% 0);
        transform:translate(18px,-4px);
    }

    80%{
        clip-path:inset(5% 0 75% 0);
        transform:translate(-15px,6px);
    }

    90%{
        clip-path:inset(35% 0 35% 0);
        transform:translate(10px,-3px);
    }

    100%{
        clip-path:inset(0 0 0 0);
        transform:translate(0);
    }

}

/* =========================
   SLICES 2
========================= */

@keyframes glitchSlices2{

    0%{
        clip-path:inset(75% 0 5% 0);
        transform:translate(20px,10px);
    }

    10%{
        clip-path:inset(5% 0 70% 0);
        transform:translate(-15px,-5px);
    }

    20%{
        clip-path:inset(45% 0 25% 0);
        transform:translate(30px,4px);
    }

    30%{
        clip-path:inset(20% 0 55% 0);
        transform:translate(-25px,-4px);
    }

    40%{
        clip-path:inset(65% 0 15% 0);
        transform:translate(15px,6px);
    }

    50%{
        clip-path:inset(10% 0 80% 0);
        transform:translate(-20px,-8px);
    }

    60%{
        clip-path:inset(55% 0 20% 0);
        transform:translate(25px,2px);
    }

    70%{
        clip-path:inset(30% 0 40% 0);
        transform:translate(-18px,-6px);
    }

    80%{
        clip-path:inset(85% 0 2% 0);
        transform:translate(12px,5px);
    }

    90%{
        clip-path:inset(40% 0 35% 0);
        transform:translate(-10px,-3px);
    }

    100%{
        clip-path:inset(0 0 0 0);
        transform:translate(0);
    }

}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:700px){

    .glitch{
        font-size:3rem;
        text-align:center;
    }

    .progress-container{
        width:90%;
    }

    .logs{
        width:90%;
        font-size:.8rem;
    }

    .terminal-box{
        font-size:.8rem;
        text-align:center;
    }

    .main-glitch{
        font-size:2.2rem;
        text-align:center;
        letter-spacing:5px;
    }

}

</style>
</head>
<body>

<!-- =========================
     LOADER
========================= -->

<div id="loader">

    <div class="glitch">
        HACKCROW
    </div>

    <div class="init">
        INITIALIZING HACKCROW SYSTEM...
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div class="percent" id="percent">
        0%
    </div>

    <div class="logs" id="logs"></div>

    <div class="terminal-box">
<pre>
┌──────────────────────────┐
│      HACKCROW.sh         │
│  Secure access granted   │
└──────────────────────────┘
</pre>
    </div>

</div>

<!-- =========================
     MAIN CONTENT
========================= -->

<div id="mainContent">

    <div class="main-glitch" data-text="HACKCROW">
        HACKCROW
    </div>

</div>

<script>

const bar = document.getElementById("bar");
const percent = document.getElementById("percent");
const logs = document.getElementById("logs");
const loader = document.getElementById("loader");
const main = document.getElementById("mainContent");

const fakeLogs = [

    "[00:00:01] Loading kernel modules... OK",
    "[00:00:02] Establishing secure connection... OK",
    "[00:00:03] Bypassing firewall... OK",
    "[00:00:04] Encrypting payload... OK",
    "[00:00:05] Injecting exploit vector... OK",
    "[00:00:06] Accessing secure nodes... OK",
    "[00:00:07] Elevating privileges... OK",
    "[00:00:08] Cleaning traces... OK",
    "[00:00:09] Access granted."

];

let progress = 0;
let logIndex = 0;

const interval = setInterval(() => {

    progress++;

    bar.style.width = progress + "%";

    percent.innerText = progress + "%";

    if(progress % 10 === 0 && logIndex < fakeLogs.length){

        const log = document.createElement("div");

        log.classList.add("log");

        log.innerText = fakeLogs[logIndex];

        logs.appendChild(log);

        logs.scrollTop = logs.scrollHeight;

        logIndex++;

    }

    if(progress >= 100){

        clearInterval(interval);

        setTimeout(() => {

            loader.style.transition = "opacity 1s ease";

            loader.style.opacity = "0";

            setTimeout(() => {

                loader.style.display = "none";

                main.classList.add("show");

            },1000);

        },800);

    }

},60);

</script>

</body>
</html>
