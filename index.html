<!-- VERSION 2 -->
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>Hackcrow</title>
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
        
        <!-- GLOBAL CSS -->
        
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/terminal.css">
        <link rel="stylesheet" href="css/status.css">
    
    </head>
    <body>
            
        <div id="secretMenu">
            <div class="menu-box">
        
                <div class="menu-title">
                    HACKCROW SYSTEM
                </div>
        
                <div class="menu-options">
        
                    <button onclick="window.location.href='aurebesh/index.html'">
                        Aurebesh Translator
                    </button>
        
                    <button onclick="window.location.href='workout/index.html'">
                        HackGym
                    </button>
        
                    <button onclick="window.location.href='words/index.html'">
                        5 Words Daily
                    </button>
        
                    <button onclick="window.location.href='tools/index.html'">
                        Tools
                    </button>
        
                </div>
        
            </div>
        </div>
        
        <div id="loader">
        
            <div class="glitch" data-text="HACKCROW">HACKCROW</div>
        
            <div class="init">
                INITIALIZING HACKCROW SYSTEM...
            </div>
        
            <div class="progress-container">
                <div class="progress-bar" id="bar"></div>
            </div>
        
            <div class="percent" id="percent">0%</div>
        
            <div class="logs" id="logs"></div>
        
            <div class="terminal-box">
        <pre>
        ┌──────────────────────────┐
        │      HACKCROW.sh         │
        │  Secure access granted   │
        └──────────────────────────┘
        </pre>
            </div>
        
        </div>
        
        <div id="mainContent">

            <div id="terminal">
        
                <div class="terminal-header">
                    HACKCROW OS v3.0
                </div>
        
                <div id="terminalOutput">
        
                </div>
        
                <div class="terminal-input">
        
                    <span class="prompt">&gt;</span>
        
                    <input
                        id="commandInput"
                        type="text"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false">
        
                </div>
        
            </div>
        
        </div>

        <div class="version-label">&pi;</div>
        
        <script src="js/app.js"></script>
        <script src="js/terminal.js"></script>
        <script src="js/commands.js"></script>
    </body>
</html>
