<!-- VERSION 2 -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hackcrow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#030303;
    overflow:hidden;
    font-family:'Share Tech Mono', monospace;
    color:#00ff88;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color:transparent;
}

/* ==================================================
   VERSION LABEL
================================================== */

.version-label{
    position:fixed;
    top:6px;
    left:50%;
    transform:translateX(-50%);
    font-size:.75rem;
    opacity:.35;
    letter-spacing:2px;
    z-index:100001;
    pointer-events:none;
}

/* ==================================================
   LOADER
================================================== */

#loader{
    position:fixed;
    inset:0;
    background:#030303;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    overflow:hidden;
}

#loader::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    opacity:.15;
    pointer-events:none;
}

/* ==================================================
   GLITCH
================================================== */

.glitch,
.main-glitch{
    position:relative;
    font-size:5rem;
    letter-spacing:12px;
    text-transform:uppercase;
    color:#00ff88;
    text-shadow:
        0 0 5px #00ff88,
        0 0 15px #00ff88,
        0 0 40px #00ff88;
    animation:textShake 7s infinite ease-in-out;
}

.glitch::before,
.glitch::after,
.main-glitch::before,
.main-glitch::after{
    content:attr(data-text);
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#030303;
}

.glitch::before,
.main-glitch::before{
    left:4px;
    text-shadow:-4px 0 #00d9ff;
    animation:glitchSlices1 7s infinite ease-in-out;
}

.glitch::after,
.main-glitch::after{
    left:-4px;
    text-shadow:4px 0 #b026ff;
    animation:glitchSlices2 7s infinite ease-in-out;
}

/* ==================================================
   TEXTOS
================================================== */

.init{
    margin-top:25px;
    margin-bottom:20px;
    font-size:1.1rem;
    letter-spacing:3px;
    text-shadow:0 0 10px #00ff88;
}

.progress-container{
    width:420px;
    height:28px;
    border:2px solid #00ff88;
    padding:4px;
    margin-bottom:15px;
    box-shadow:0 0 15px #00ff8850;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#00ff88;
    box-shadow:0 0 20px #00ff88;
    transition:width .03s linear;
}

.percent{
    margin-bottom:20px;
    font-size:1.1rem;
}

.logs{
    width:500px;
    height:180px;
    overflow:hidden;
    border:1px solid rgba(0,255,136,.2);
    background:rgba(0,255,136,.03);
    padding:15px;
    box-shadow:0 0 20px rgba(0,255,136,.1) inset;
}

.log{
    margin-bottom:8px;
    font-size:.9rem;
    opacity:0;
    animation:fadeIn .3s forwards;
}

@keyframes fadeIn{
    to{ opacity:1; }
}

.terminal-box{
    margin-top:25px;
    text-shadow:0 0 10px #00ff88;
}

#mainContent{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    background:#030303;
}

.show{
    display:flex !important;
}

/* ==================================================
   MENU
================================================== */

#secretMenu{
    position:fixed;
    top:-400px;
    left:50%;
    transform:translateX(-50%);
    width:320px;
    background:rgba(0,0,0,.92);
    border:1px solid #00ff88;
    box-shadow:
        0 0 20px #00ff88,
        0 0 50px rgba(0,255,136,.15);
    padding:20px;
    z-index:100000;
    transition:.5s ease;
    backdrop-filter:blur(10px);
}

#secretMenu.showMenu{
    top:20px;
}

.menu-box{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.menu-title{
    text-align:center;
    font-size:1.2rem;
    letter-spacing:4px;
    margin-bottom:10px;
    text-shadow:0 0 10px #00ff88;
}

.menu-box button{
    background:#050505;
    border:1px solid #00ff88;
    color:#00ff88;
    padding:12px;
    cursor:pointer;
    font-family:'Share Tech Mono', monospace;
    font-size:1rem;
    transition:.3s;
}

.menu-box button:hover{
    background:#00ff88;
    color:#000;
    box-shadow:0 0 20px #00ff88;
}

/* ==================================================
   ANIMATIONS
================================================== */

@keyframes textShake{
    0%,75%,100%{ transform:translate(0); }
    76%{ transform:translate(-2px,1px); }
    77%{ transform:translate(3px,-1px); }
    78%{ transform:translate(-5px,2px); }
    79%{ transform:translate(5px,-2px); }
    80%{ transform:translate(-7px,3px); }
    81%{ transform:translate(7px,-3px); }
    82%{ transform:translate(-4px,1px); }
    83%{ transform:translate(4px,-1px); }
    84%{ transform:translate(-8px,2px); }
    85%{ transform:translate(8px,-2px); }
    86%{ transform:translate(0); }
}

@keyframes glitchSlices1{
    0%,75%,100%{ clip-path:inset(0 0 0 0); transform:translate(0); }
    76%{ clip-path:inset(10% 0 80% 0); transform:translate(-10px,-3px); }
    78%{ clip-path:inset(40% 0 30% 0); transform:translate(12px,3px); }
    80%{ clip-path:inset(70% 0 5% 0); transform:translate(-15px,4px); }
    82%{ clip-path:inset(20% 0 50% 0); transform:translate(18px,-3px); }
    84%{ clip-path:inset(55% 0 15% 0); transform:translate(-20px,2px); }
    86%{ clip-path:inset(0 0 0 0); transform:translate(0); }
}

@keyframes glitchSlices2{
    0%,75%,100%{ clip-path:inset(0 0 0 0); transform:translate(0); }
    76%{ clip-path:inset(75% 0 5% 0); transform:translate(10px,3px); }
    78%{ clip-path:inset(5% 0 70% 0); transform:translate(-12px,-3px); }
    80%{ clip-path:inset(45% 0 25% 0); transform:translate(15px,4px); }
    82%{ clip-path:inset(25% 0 45% 0); transform:translate(-18px,-2px); }
    84%{ clip-path:inset(60% 0 10% 0); transform:translate(20px,2px); }
    86%{ clip-path:inset(0 0 0 0); transform:translate(0); }
}

@media(max-width:700px){
    .glitch,.main-glitch{
        font-size:2.5rem;
        letter-spacing:5px;
        text-align:center;
    }

    .progress-container{ width:90%; }
    .logs{ width:90%; font-size:.8rem; }
    #secretMenu{ width:90%; }
}

</style>
</head>
<body>

<div class="version-label">VERSION 2</div>

<div id="secretMenu">
    <div class="menu-box">
        <div class="menu-title">HACKCROW MENU</div>

        <button onclick="window.location.href='aurebesh/index.html'">
            Traductor Aurebesh
        </button>

        <button onclick="window.location.href='workout/index.html'">
            Workout
        </button>

        <button>
            Option 03
        </button>
    </div>
</div>

<div id="loader">

    <div class="glitch" data-text="HACKCROW">HACKCROW</div>

    <div class="init">
        INITIALIZING HACKCROW SYSTEM...
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div class="percent" id="percent">0%</div>

    <div class="logs" id="logs"></div>

    <div class="terminal-box">
<pre>
┌──────────────────────────┐
│      HACKCROW.sh         │
│  Secure access granted   │
└──────────────────────────┘
</pre>
    </div>

</div>

<div id="mainContent">
    <div class="main-glitch" data-text="HACKCROW">HACKCROW</div>
</div>

<script>

const bar = document.getElementById("bar");
const percent = document.getElementById("percent");
const logs = document.getElementById("logs");
const loader = document.getElementById("loader");
const main = document.getElementById("mainContent");
const secretMenu = document.getElementById("secretMenu");

const fakeLogs = [
    "[00:00:01] Loading kernel modules... OK",
    "[00:00:02] Establishing secure connection... OK",
    "[00:00:03] Bypassing firewall... OK",
    "[00:00:04] Encrypting payload... OK",
    "[00:00:05] Injecting exploit vector... OK",
    "[00:00:06] Accessing secure nodes... OK",
    "[00:00:07] Elevating privileges... OK",
    "[00:00:08] Cleaning traces... OK",
    "[00:00:09] Access granted."
];

let progress = 0;
let logIndex = 0;

const interval = setInterval(() => {

    progress += 2;

    if(progress > 100) progress = 100;

    bar.style.width = progress + "%";
    percent.innerText = progress + "%";

    if(progress % 10 === 0 && logIndex < fakeLogs.length){

        const log = document.createElement("div");
        log.classList.add("log");
        log.innerText = fakeLogs[logIndex];
        logs.appendChild(log);
        logs.scrollTop = logs.scrollHeight;
        logIndex++;
    }

    if(progress >= 100){

        clearInterval(interval);

        setTimeout(() => {

            loader.style.transition = "opacity .35s ease";
            loader.style.opacity = "0";

            setTimeout(() => {
                loader.style.display = "none";
                main.classList.add("show");
            },350);

        },120);
    }

},16);

/* PC HK */

let typed = "";

document.addEventListener("keydown", (e) => {

    typed += e.key.toLowerCase();
    typed = typed.slice(-2);

    if(typed === "hk"){
        secretMenu.classList.toggle("showMenu");
        typed = "";
    }

});

/* MOBILE DOUBLE TAP */

let lastTap = 0;

document.addEventListener("touchend", function(){

    const currentTime = new Date().getTime();
    const tapLength = currentTime - lastTap;

    if(tapLength < 300 && tapLength > 0){
        secretMenu.classList.toggle("showMenu");
    }

    lastTap = currentTime;

});

</script>

</body>
</html>
