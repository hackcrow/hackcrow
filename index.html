<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hackcrow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ==================================================
     SECRET MENU
================================================== -->

<div id="secretMenu">

    <div class="menu-box">

        <div class="menu-title">
            HACKCROW MENU
        </div>

        <button onclick="window.location.href='aurebesh/index.html'">
            Traductor Aurebesh
        </button>

        <button onclick="window.location.href='workout/index.html'">
            Workout
        </button>

        

    </div>

</div>

<!-- ==================================================
     LOADER
================================================== -->

<div id="loader">

    <div class="glitch" data-text="HACKCROW">
        HACKCROW
    </div>

    <div class="init">
        INITIALIZING HACKCROW SYSTEM...
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div class="percent" id="percent">
        0%
    </div>

    <div class="logs" id="logs"></div>

    <div class="terminal-box">
<pre>
┌──────────────────────────┐
│      HACKCROW.sh         │
│  Secure access granted   │
└──────────────────────────┘
</pre>
    </div>

</div>

<!-- ==================================================
     MAIN CONTENT
================================================== -->

<div id="mainContent">

    <div class="main-glitch" data-text="HACKCROW">
        HACKCROW
    </div>

</div>

<script src="src/app.js"></script>

</body>
</html>
