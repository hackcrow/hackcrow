<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Hackcrow</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#030303;
    overflow:hidden;
    font-family:'Share Tech Mono', monospace;
    color:#00ff88;
}

/* =========================
   LOADER
========================= */

#loader{
    position:fixed;
    inset:0;
    background:#030303;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    overflow:hidden;
}

/* scanlines */

#loader::before{
    content:"";
    position:absolute;
    inset:0;
    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
    opacity:.15;
}

/* =========================
   LOADER GLITCH
========================= */

.glitch{
    position:relative;
    font-size:5rem;
    letter-spacing:8px;
    text-transform:uppercase;

    text-shadow:
        0 0 5px #00ff88,
        0 0 15px #00ff88,
        0 0 30px #00ff88;

    animation:
        intenseGlitch 2s infinite,
        flicker 4s infinite;

    margin-bottom:30px;
}

.glitch::before,
.glitch::after{
    content:"HACKCROW";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

.glitch::before{

    color:#00d9ff;

    z-index:-1;

    animation:
        glitchTop 0.12s infinite,
        glitchFlash 2s infinite;

    clip-path:polygon(
        0 2%,
        100% 2%,
        100% 45%,
        0 45%
    );
}

.glitch::after{

    color:#b026ff;

    z-index:-2;

    animation:
        glitchBottom 0.15s infinite,
        glitchFlash2 1.7s infinite;

    clip-path:polygon(
        0 60%,
        100% 60%,
        100% 100%,
        0 100%
    );
}

/* =========================
   INITIALIZING
========================= */

.init{
    font-size:1.2rem;
    margin-bottom:20px;
    letter-spacing:3px;
    text-shadow:0 0 10px #00ff88;
}

/* =========================
   PROGRESS BAR
========================= */

.progress-container{
    width:420px;
    height:30px;
    border:2px solid #00ff88;
    padding:4px;
    margin-bottom:15px;
    box-shadow:0 0 15px #00ff8850;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#00ff88;
    box-shadow:0 0 20px #00ff88;
    transition:width .15s linear;
}

.percent{
    margin-bottom:25px;
    font-size:1.2rem;
}

/* =========================
   LOGS
========================= */

.logs{
    width:500px;
    height:180px;
    border:1px solid #00ff8840;
    padding:15px;
    overflow:hidden;
    background:rgba(0,255,136,.03);
    box-shadow:0 0 20px #00ff8820 inset;
}

.log{
    font-size:.95rem;
    margin-bottom:8px;
    opacity:0;
    animation:fadeIn .3s forwards;
}

@keyframes fadeIn{
    to{
        opacity:1;
    }
}

/* =========================
   TERMINAL BOX
========================= */

.terminal-box{
    margin-top:30px;
    color:#00ff88;
    font-size:1rem;
    line-height:1.6;
    text-shadow:0 0 8px #00ff88;
}

/* =========================
   MAIN CONTENT
========================= */

#mainContent{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    background:#030303;
}

.show{
    display:flex !important;
}

/* =========================
   MAIN GLITCH
========================= */

.main-glitch{
    position:relative;
    font-size:4rem;
    letter-spacing:10px;
    color:#00ff88;
    text-transform:uppercase;

    text-shadow:
        0 0 5px #00ff88,
        0 0 15px #00ff88,
        0 0 30px #00ff88;

    animation:
        intenseGlitch 2s infinite,
        flicker 4s infinite;
}

/* capas glitch */

.main-glitch::before,
.main-glitch::after{
    content:attr(data-text);
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* cyan */

.main-glitch::before{

    color:#00d9ff;

    z-index:-1;

    animation:
        glitchTop 0.12s infinite,
        glitchFlash 2s infinite;

    clip-path:polygon(
        0 2%,
        100% 2%,
        100% 45%,
        0 45%
    );
}

/* purple */

.main-glitch::after{

    color:#b026ff;

    z-index:-2;

    animation:
        glitchBottom 0.15s infinite,
        glitchFlash2 1.7s infinite;

    clip-path:polygon(
        0 60%,
        100% 60%,
        100% 100%,
        0 100%
    );
}

/* =========================
   GLITCH ANIMATIONS
========================= */

@keyframes intenseGlitch{

    0%{
        transform:translate(0);
        filter:blur(0);
    }

    5%{
        transform:translate(-8px,2px) skewX(8deg);
    }

    10%{
        transform:translate(6px,-3px) skewX(-10deg);
    }

    15%{
        transform:translate(-12px,5px);
    }

    20%{
        transform:translate(0);
    }

    25%{
        transform:scaleX(1.04);
    }

    30%{
        transform:translate(15px,-4px);
    }

    35%{
        transform:translate(-15px,4px);
    }

    40%{
        transform:translate(0);
    }

    45%{
        filter:blur(2px);
    }

    50%{
        filter:blur(0);
    }

    100%{
        transform:translate(0);
    }
}

/* lineas superiores */

@keyframes glitchTop{

    0%{
        transform:translate(0);
    }

    20%{
        transform:translate(-20px,-5px);
    }

    40%{
        transform:translate(20px,5px);
    }

    60%{
        transform:translate(-30px,2px);
    }

    80%{
        transform:translate(30px,-2px);
    }

    100%{
        transform:translate(0);
    }
}

/* lineas inferiores */

@keyframes glitchBottom{

    0%{
        transform:translate(0);
    }

    20%{
        transform:translate(25px,5px);
    }

    40%{
        transform:translate(-25px,-5px);
    }

    60%{
        transform:translate(35px,-2px);
    }

    80%{
        transform:translate(-35px,2px);
    }

    100%{
        transform:translate(0);
    }
}

/* flashes */

@keyframes glitchFlash{

    0%,100%{
        opacity:0;
    }

    10%{
        opacity:1;
    }

    11%{
        opacity:0;
    }

    50%{
        opacity:1;
    }

    51%{
        opacity:0;
    }
}

@keyframes glitchFlash2{

    0%,100%{
        opacity:0;
    }

    30%{
        opacity:1;
    }

    31%{
        opacity:0;
    }

    70%{
        opacity:1;
    }

    71%{
        opacity:0;
    }
}

/* flicker */

@keyframes flicker{

    0%,100%{
        opacity:1;
    }

    92%{
        opacity:.8;
    }

    94%{
        opacity:.4;
    }

    96%{
        opacity:1;
    }

    98%{
        opacity:.6;
    }
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:700px){

    .glitch{
        font-size:3rem;
        text-align:center;
    }

    .progress-container{
        width:90%;
    }

    .logs{
        width:90%;
        font-size:.8rem;
    }

    .terminal-box{
        font-size:.8rem;
        text-align:center;
    }

    .main-glitch{
        font-size:2.2rem;
        text-align:center;
        letter-spacing:5px;
    }

}

</style>
</head>
<body>

<!-- =========================
     LOADER
========================= -->

<div id="loader">

    <div class="glitch">
        HACKCROW
    </div>

    <div class="init">
        INITIALIZING HACKCROW SYSTEM...
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div class="percent" id="percent">
        0%
    </div>

    <div class="logs" id="logs"></div>

    <div class="terminal-box">
<pre>
┌──────────────────────────┐
│      HACKCROW.sh         │
│  Secure access granted   │
└──────────────────────────┘
</pre>
    </div>

</div>

<!-- =========================
     MAIN CONTENT
========================= -->

<div id="mainContent">

    <div class="main-glitch" data-text="HACKCROW">
        HACKCROW
    </div>

</div>

<script>

const bar = document.getElementById("bar");
const percent = document.getElementById("percent");
const logs = document.getElementById("logs");
const loader = document.getElementById("loader");
const main = document.getElementById("mainContent");

const fakeLogs = [

    "[00:00:01] Loading kernel modules... OK",
    "[00:00:02] Establishing secure connection... OK",
    "[00:00:03] Bypassing firewall... OK",
    "[00:00:04] Encrypting payload... OK",
    "[00:00:05] Injecting exploit vector... OK",
    "[00:00:06] Accessing secure nodes... OK",
    "[00:00:07] Elevating privileges... OK",
    "[00:00:08] Cleaning traces... OK",
    "[00:00:09] Access granted."

];

let progress = 0;
let logIndex = 0;

const interval = setInterval(() => {

    progress++;

    bar.style.width = progress + "%";
    percent.innerText = progress + "%";

    if(progress % 10 === 0 && logIndex < fakeLogs.length){

        const log = document.createElement("div");

        log.classList.add("log");

        log.innerText = fakeLogs[logIndex];

        logs.appendChild(log);

        logs.scrollTop = logs.scrollHeight;

        logIndex++;

    }

    if(progress >= 100){

        clearInterval(interval);

        setTimeout(() => {

            loader.style.transition = "opacity 1s ease";
            loader.style.opacity = "0";

            setTimeout(() => {

                loader.style.display = "none";
                main.classList.add("show");

            },1000);

        },800);

    }

},60);

</script>

</body>
</html>
