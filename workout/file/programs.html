<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content=" width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Programas — Workout</title>

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- GLOBAL CSS -->
  <link rel="stylesheet" href="../css/style.css">

  <!-- PROGRAMS CSS -->
  <link rel="stylesheet" href="../css/programs.css">

  <!-- FAVICON -->
  <link rel="icon" type="image/x-icon" href="../src/images/favicon.ico">

</head>

<body>

  <!-- OVERLAY -->
  <div id="overlay"></div>

  <!-- TOPBAR -->
  <div id="topbarContainer"></div>

  <!-- MENU -->
  <div id="menuContainer"></div>

  <!-- APP -->
  <main id="app">

    <div id="page-programs">

      <!-- PAGE HEADER -->
      <div class="page-header">

        <div>

          <div class="page-title">
            Programas
          </div>

          <div class="page-subtitle">
            // Organiza tus entrenamientos
          </div>

        </div>

        <a
          class="back-btn"
          href="../index.html"
        >
          ← Volver
        </a>

      </div>

      <!-- ACTIONS -->
      <div class="filter-bar">

        <div class="filter-pills">

          <button class="pill active">
            Todos
          </button>

        </div>

        <div class="action-buttons">

          <!-- DELETE PROGRAM -->
          <button
            id="deleteProgramBtn"
            class="delete-ex-btn"
            title="Eliminar programa"
          >

            <svg
              viewBox="0 0 24 24"
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >

              <path d="M3 6h18" />
              <path d="M8 6V4h8v2" />
              <path d="M19 6l-1 14H6L5 6" />
              <path d="M10 11v6" />
              <path d="M14 11v6" />

            </svg>

          </button>

          <!-- ADD PROGRAM -->
          <button
            id="addProgramBtn"
            class="add-ex-btn"
            title="Agregar programa"
          >

            ＋

          </button>

        </div>

      </div>

      <!-- LOADING -->
      <div
        id="loadingPrograms"
        class="terminal-loading"
      >

        Loading programs...

      </div>

      <!-- GRID -->
      <div
        id="programGrid"
        class="exercise-grid"
      ></div>

    </div>

  </main>

  <!-- CREATE PROGRAM -->
  <div
    id="programLightbox"
    class="lightbox-overlay"
  >

    <div
      class="
        lightbox-card
        create-program-card
      "
    >

      <div class="lightbox-header">

        <h2 id="programLbTitle">
          Nuevo Programa
        </h2>

      </div>

      <div class="lightbox-body">

        <input
          id="pgNombre"
          type="text"
          placeholder="Nombre del programa"
        >

        <textarea
          id="pgDescripcion"
          placeholder="Descripción"
        ></textarea>

      </div>

      <div class="lightbox-actions">

        <button
          id="pgCancel"
          class="btn btn-ghost"
        >

          Cancelar

        </button>

        <button
          id="pgSave"
          class="btn"
        >

          Guardar

        </button>

      </div>

    </div>

  </div>

  <!-- VIEW PROGRAM -->
  <div
    id="viewProgramOverlay"
    class="lightbox-overlay"
  >

    <div
      class="
        lightbox-card
        program-detail-card
      "
    >

      <div class="lightbox-header">

        <h2 id="viewProgramTitle">
          Programa
        </h2>

      </div>

      <div
        id="programRoutineList"
        class="program-routine-list"
      ></div>

      <div class="lightbox-actions">

        <button
          id="viewProgramClose"
          class="btn btn-ghost"
        >

          Cerrar

        </button>

      </div>

    </div>

  </div>

  <!-- DELETE PROGRAMS -->
  <div
    id="deleteProgramOverlay"
    class="lightbox-overlay"
  >

    <div
      class="
        lightbox-card
        delete-routines-card
      "
    >

      <div class="lightbox-header">

        <h2>
          Administrar Programas
        </h2>

      </div>

      <div
        id="deleteProgramList"
        class="delete-routine-list"
      ></div>

      <div class="lightbox-actions">

        <button
          id="closeDeleteProgramOverlay"
          class="btn btn-ghost"
        >

          Cerrar

        </button>

      </div>

    </div>

  </div>

  <!-- CONFIRM -->
  <div
    id="confirmOverlay"
    class="lightbox-overlay"
  >

    <div
      class="
        lightbox-card
        confirm-card
      "
    >

      <div class="lightbox-header">

        <h2 id="confirmTitle">
          Confirmar
        </h2>

      </div>

      <div class="lightbox-body">

        <p id="confirmMessage">
          ¿Seguro?
        </p>

      </div>

      <div class="lightbox-actions">

        <button
          id="confirmCancel"
          class="btn btn-ghost"
        >

          Cancelar

        </button>

        <button
          id="confirmOk"
          class="
            btn
            danger-btn
          "
        >

          Eliminar

        </button>

      </div>

    </div>

  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="../js/app.js"></script>

  <script src="../js/programs.js"></script>

</body>

</html>
