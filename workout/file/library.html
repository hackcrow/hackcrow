<!-- APP -->
<main id="app">

    <div class="page-header">
      <div>

      </div>

    <div class="filter-pills">

============================================= -->
<div id="lightboxOverlay" class="lb-overlay">

    <!-- HEADER con botones -->
    <div class="lb-header">
      <button class="lb-btn-cancel" id="lbCancel">Cancelar</button>
      <span class="lb-header-title">Editar ejercicio</span>

    <!-- BODY scrollable -->
    <div class="lb-body">

      <!-- IMAGEN -->
      <div class="lb-field">
        <label class="lb-label">Imagen del ejercicio</label>
        <div class="lb-image-upload" id="lbImageArea">
          <input type="file" id="lbImageInput" accept="image/*" hidden>
          <div class="lb-image-preview" id="lbImagePreview">
            <div class="lb-image-placeholder" id="lbImagePlaceholder">
              <span class="lb-upload-icon">＋</span>
              <span class="lb-upload-text">Subir imagen</span>
            </div>
            <img id="lbImageEl" src="" alt="" style="display:none;">
          </div>
        </div>
      </div>

      <!-- NOMBRE -->
      <div class="lb-field">
        <label class="lb-label" for="lbNombre">Nombre del ejercicio</label>
        <input class="lb-input" type="text" id="lbNombre" placeholder="Ej. Flexiones estándar">
      </div>

      <!-- TIPO DE EJERCICIO -->
      <div class="lb-field">
        <label class="lb-label" for="lbTipo">Tipo de ejercicio</label>

            <option value="">— Seleccionar —</option>
            <option value="fuerza">Fuerza</option>
            <option value="cardio">Cardio</option>
            <option value="flexibilidad">Flexibilidad</option>
            <option value="movilidad">Movilidad</option>
            <option value="isometrico">Isométrico</option>
            <option value="pliometrico">Pliométrico</option>
            <option value="resistencia">Resistencia</option>
          </select>
          <span class="lb-select-arrow">›</span>
        </div>
      </div>

            <option value="peso_extra">Peso extra</option>
