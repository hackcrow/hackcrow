<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — Workout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/library.css">
</head>
<body>

<div class="version-bar">v2</div>
<div id="overlay"></div>

<header id="topbar">
  <div class="topbar-left">
    <div class="logo">Work<span>out</span></div>
  </div>
  <div class="topbar-right">
    <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
      <span class="moon-icon">🌙</span>
      <span class="sun-icon">☀️</span>
    </button>
    <button class="menu-btn" id="menuBtn" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<nav id="dropMenu">
  <div class="menu-section">
    <div class="menu-section-label">Principal</div>
    <a class="menu-item" href="../index.html">
      <span class="item-icon">⊞</span>
      Dashboard
    </a>
  </div>

  <div class="menu-divider"></div>

  <div class="menu-section">
    <div class="menu-section-label">Herramientas</div>
    <a class="menu-item active" href="library.html">
      <span class="item-icon">📚</span>
      Biblioteca de Ejercicios
      <span class="item-badge">NEW</span>
    </a>
  </div>
</nav>

<main id="app">
  <div id="page-biblioteca">

    <div class="page-header">
      <div>
        <div class="page-title">Biblioteca de Ejercicios</div>
        <div class="page-subtitle">// Ejercicios para casa · sin equipo</div>
      </div>
      <a class="back-btn" href="../index.html">← Volver</a>
    </div>

    <div class="filter-pills">
      <button class="pill active" data-filter="todos">Todos</button>
      <button class="pill" data-filter="pecho">Pecho</button>
      <button class="pill" data-filter="espalda">Espalda</button>
      <button class="pill" data-filter="piernas">Piernas</button>
      <button class="pill" data-filter="hombros">Hombros</button>
      <button class="pill" data-filter="core">Core</button>
      <button class="pill" data-filter="brazos">Brazos</button>
      <button class="pill" data-filter="cardio">Cardio</button>
    
      <div class="action-buttons">
      <button id="deleteListBtn" class="pill-add-btn" title="Eliminar ejercicios">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18"/>
          <path d="M8 6V4h8v2"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6"/>
          <path d="M14 11v6"/>
        </svg>
      </button>
    
      <button id="addExerciseBtn" class="pill-add-btn" title="Agregar ejercicio">+</button>
    </div>
    </div>

    <div id="loadingExercises" class="terminal-loading">Loading exercises...</div>
    <div id="exerciseGrid" class="exercise-grid"></div>

  </div>
</main>

<!-- LIGHTBOX -->
<div id="lightboxOverlay" class="lb-overlay">
  <div class="lb-panel">

    <div class="lb-header">
      <button class="lb-btn-cancel" id="lbCancel">Cancelar</button>
      <span class="lb-header-title" id="lbTitle">Editar ejercicio</span>
      <button class="lb-btn-save" id="lbSave">Guardar</button>
    </div>

    <div class="lb-body">

      <!-- IMAGEN -->
      <div class="lb-field">
        <label class="lb-label">Imagen del ejercicio</label>
        <div class="lb-image-upload" id="lbImageArea">
          <input type="file" id="lbImageInput" accept="image/*" hidden>
          <div class="lb-image-preview" id="lbImagePreview">
            <div class="lb-image-placeholder" id="lbImagePlaceholder">
              <span class="lb-upload-icon">＋</span>
              <span class="lb-upload-text">Subir imagen</span>
            </div>
          
            <img id="lbImageEl" src="" alt="" style="display:none;">
          
            <div class="lb-image-overlay">CHANGE IMAGE</div>
          </div>
        </div>
      </div>

      <!-- NOMBRE INGLES -->
      <div class="lb-field">
        <label class="lb-label" for="lbNombreEn">Nombre en inglés</label>
        <input class="lb-input" type="text" id="lbNombreEn">
      </div>
      
      <!-- NOMBRE ESPAÑOL -->
      <div class="lb-field">
        <label class="lb-label" for="lbNombre">Nombre en español</label>
        <input class="lb-input" type="text" id="lbNombre">
      </div>

      <!-- DESCRIPCION -->
      <div class="lb-field">
        <label class="lb-label" for="lbDescripcion">Descripción</label>
        <textarea class="lb-input" id="lbDescripcion" rows="4"></textarea>
      </div>

      <!-- TIPO -->
      <div class="lb-field">
        <label class="lb-label" for="lbTipo">Tipo de ejercicio</label>
        <div class="lb-select-wrap">
          <select class="lb-select" id="lbTipo">
            <option value="">— Seleccionar —</option>
            <option value="fuerza">Fuerza</option>
            <option value="cardio">Cardio</option>
            <option value="flexibilidad">Flexibilidad</option>
            <option value="movilidad">Movilidad</option>
            <option value="isometrico">Isométrico</option>
            <option value="pliometrico">Pliométrico</option>
            <option value="resistencia">Resistencia</option>
          </select>
          <span class="lb-select-arrow">›</span>
        </div>
      </div>

      <!-- EQUIPO -->
      <div class="lb-field">
        <label class="lb-label" for="lbEquipo">Equipo</label>
        <div class="lb-select-wrap">
          <select class="lb-select" id="lbEquipo">
            <option value="">— Seleccionar —</option>
            <option value="peso_corporal">Peso corporal</option>
            <option value="mancuernas">Mancuernas</option>
            <option value="peso_extra">Peso extra</option>
            <option value="banda">Banda</option>
            <option value="rueda_abdominal">Rueda abdominal</option>
          </select>
          <span class="lb-select-arrow">›</span>
        </div>
      </div>

      <!-- MUSCULO PRIMARIO -->
      <div class="lb-field">
        <label class="lb-label" for="lbMusculoPrimario">Músculo primario</label>
        <div class="lb-select-wrap">
          <select class="lb-select" id="lbMusculoPrimario">
            <option value="">— Seleccionar —</option>
            <option value="pectorals">Pectorales</option>
            <option value="back">Espalda</option>
            <option value="shoulders">Hombros</option>
            <option value="biceps">Bíceps</option>
            <option value="triceps">Tríceps</option>
            <option value="quadriceps">Cuádriceps</option>
            <option value="glutes">Glúteos</option>
            <option value="abs">Abdominales</option>
            <option value="core">Core</option>
            <option value="full_body">Cuerpo completo</option>
          </select>
          <span class="lb-select-arrow">›</span>
        </div>
      </div>

      <!-- MUSCULO SECUNDARIO -->
      <div class="lb-field">
        <label class="lb-label" for="lbMusculoSecundario">Músculo secundario</label>
        <div class="lb-select-wrap">
          <select class="lb-select" id="lbMusculoSecundario">
            <option value="">— Seleccionar —</option>
            <option value="triceps">Tríceps</option>
            <option value="biceps">Bíceps</option>
            <option value="glutes">Glúteos</option>
            <option value="hamstrings">Isquiotibiales</option>
            <option value="obliques">Oblicuos</option>
            <option value="core">Core</option>
            <option value="quadriceps">Cuádriceps</option>
          </select>
          <span class="lb-select-arrow">›</span>
        </div>
      </div>

      <!-- PARTE CUERPO -->
      <div class="lb-field">
        <label class="lb-label" for="lbParteCuerpo">Parte del cuerpo</label>
        <div class="lb-select-wrap">
          <select class="lb-select" id="lbParteCuerpo">
            <option value="">— Seleccionar —</option>
            <option value="chest">Pecho</option>
            <option value="back">Espalda</option>
            <option value="thighs">Piernas</option>
            <option value="glutes">Glúteos</option>
            <option value="shoulders">Hombros</option>
            <option value="abdominals">Abdominales</option>
            <option value="upper_arms">Brazos</option>
            <option value="core">Cardio</option>
          </select>
          <span class="lb-select-arrow">›</span>
        </div>
      </div>

      <!-- VIDEO -->
      <div class="lb-field">
        <label class="lb-label" for="lbVideo">URL de video de referencia</label>
        <input class="lb-input" type="url" id="lbVideo" placeholder="https://youtube.com/watch?v=...">
      </div>

    </div>
  </div>
</div>

<!-- LIGHTBOX VER DETALLE -->
<div id="viewOverlay" class="lb-overlay">
  <div class="lb-panel detail-panel">

    <div class="lb-header">
      <button class="lb-btn-cancel" id="viewClose">Cerrar</button>
      <span class="lb-header-title">Detalle del ejercicio</span>
      <button class="lb-btn-save" id="viewEditBtn">Editar</button>
    </div>

    <div class="lb-body" id="viewContent"></div>

  </div>
</div>

<!-- LIGHTBOX VER Eliminar -->
<div id="deleteOverlay" class="lb-overlay">
  <div class="lb-panel detail-panel">

    <div class="lb-header">
      <button class="lb-btn-cancel" id="deleteClose">Cerrar</button>
      <span class="lb-header-title">Eliminar ejercicios</span>
      <button class="lb-btn-save" style="visibility:hidden;">.</button>
    </div>

    <div class="lb-body">
      <div class="delete-filters">
        <input id="filterNameEn" class="lb-input" placeholder="Buscar inglés">
        <input id="filterNameEs" class="lb-input" placeholder="Buscar español">
      </div>

      <div class="delete-table-wrap">
        <table class="delete-table">
          <thead>
            <tr>
              <th>English</th>
              <th>Español</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="deleteTableBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<button id="scrollTopBtn" class="floating-btn top-btn">↑</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/library.js"></script>

</body>
</html>
