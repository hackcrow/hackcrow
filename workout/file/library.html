<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — Workout</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/library.css">
</head>
<body>

<div class="version-bar">v2</div>

<div id="overlay"></div>

<!-- TOPBAR -->
<header id="topbar">
  <div class="topbar-left">
    <div class="logo">Work<span>out</span></div>
  </div>

  <div class="topbar-right">
    <button class="theme-toggle" id="themeToggle" title="Cambiar tema">
      <span class="moon-icon">🌙</span>
      <span class="sun-icon">☀️</span>
    </button>

    <button class="menu-btn" id="menuBtn" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- MENU -->
<nav id="dropMenu">
  <div class="menu-section">
    <div class="menu-section-label">Principal</div>
    <a class="menu-item" href="../index.html">
      <span class="item-icon">⊞</span>
      Dashboard
    </a>
  </div>

  <div class="menu-divider"></div>

  <div class="menu-section">
    <div class="menu-section-label">Herramientas</div>

    <a class="menu-item active" href="library.html">
      <span class="item-icon">📚</span>
      Biblioteca de Ejercicios
      <span class="item-badge">NEW</span>
    </a>
  </div>
</nav>

<!-- MAIN -->
<main id="app">
  <div id="page-biblioteca">

    <div class="page-header">
      <div>
        <div class="page-title">Biblioteca de Ejercicios</div>
        <div class="page-subtitle">// Ejercicios para casa · sin equipo</div>
      </div>

      <a class="back-btn" href="../index.html">← Volver</a>
    </div>

    <!-- FILTROS -->
    <div class="filter-pills">
      <button class="pill active" data-filter="todos">Todos</button>
      <button class="pill" data-filter="pecho">Pecho</button>
      <button class="pill" data-filter="espalda">Espalda</button>
      <button class="pill" data-filter="piernas">Piernas</button>
      <button class="pill" data-filter="hombros">Hombros</button>
      <button class="pill" data-filter="core">Core</button>
      <button class="pill" data-filter="brazos">Brazos</button>
      <button class="pill" data-filter="cardio">Cardio</button>
    </div>

    <!-- GRID -->
    <div class="exercise-grid" id="exerciseGrid"></div>

  </div>
</main>

<!-- LIGHTBOX -->
<div id="lightboxOverlay" class="lb-overlay">
  <div class="lb-panel">

    <div class="lb-header">
      <button class="lb-btn-cancel" id="lbCancel">Cancelar</button>
      <span class="lb-header-title">Editar ejercicio</span>
      <button class="lb-btn-save" id="lbSave">Guardar</button>
    </div>

    <div class="lb-body">

      <div class="lb-field">
        <label class="lb-label">Imagen del ejercicio</label>
        <div class="lb-image-upload" id="lbImageArea">
          <input type="file" id="lbImageInput" accept="image/*" hidden>

          <div class="lb-image-preview" id="lbImagePreview">
            <div class="lb-image-placeholder" id="lbImagePlaceholder">
              <span class="lb-upload-icon">＋</span>
              <span class="lb-upload-text">Subir imagen</span>
            </div>

            <img id="lbImageEl" src="" alt="" style="display:none;">
          </div>
        </div>
      </div>

      <div class="lb-field">
        <label class="lb-label" for="lbNombre">Nombre del ejercicio</label>
        <input class="lb-input" type="text" id="lbNombre">
      </div>

      <div class="lb-field">
        <label class="lb-label" for="lbTipo">Tipo de ejercicio</label>
        <select class="lb-select" id="lbTipo">
          <option value="">Seleccionar</option>
          <option value="fuerza">Fuerza</option>
          <option value="cardio">Cardio</option>
          <option value="isometrico">Isométrico</option>
        </select>
      </div>

      <div class="lb-field">
        <label class="lb-label" for="lbEquipo">Equipo</label>
        <select class="lb-select" id="lbEquipo">
          <option value="">Seleccionar</option>
          <option value="peso_corporal">Peso corporal</option>
          <option value="mancuernas">Mancuernas</option>
        </select>
      </div>

      <div class="lb-field">
        <label class="lb-label" for="lbMusculoPrimario">Músculo primario</label>
        <input class="lb-input" type="text" id="lbMusculoPrimario">
      </div>

      <div class="lb-field">
        <label class="lb-label" for="lbMusculoSecundario">Músculo secundario</label>
        <input class="lb-input" type="text" id="lbMusculoSecundario">
      </div>

      <div class="lb-field">
        <label class="lb-label" for="lbParteCuerpo">Parte del cuerpo</label>
        <input class="lb-input" type="text" id="lbParteCuerpo">
      </div>

      <div class="lb-field">
        <label class="lb-label" for="lbVideo">URL de video</label>
        <input class="lb-input" type="url" id="lbVideo">
      </div>

    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/library.js"></script>

</body>
</html>
