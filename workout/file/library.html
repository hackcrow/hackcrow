<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — Workout</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/library.css">
</head>
<body>

<div class="version-bar">v2</div>
<div id="overlay"></div>

<header id="topbar">
  <div class="topbar-left">
    <div class="logo">Work<span>out</span></div>
  </div>

  <div class="topbar-right">
    <button class="theme-toggle" id="themeToggle">
      <span class="moon-icon">🌙</span>
      <span class="sun-icon">☀️</span>
    </button>

    <button class="menu-btn" id="menuBtn">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<nav id="dropMenu">
  <div class="menu-section">
    <div class="menu-section-label">Principal</div>
    <a class="menu-item" href="../index.html">Dashboard</a>
  </div>

  <div class="menu-divider"></div>

  <div class="menu-section">
    <div class="menu-section-label">Herramientas</div>
    <a class="menu-item active" href="library.html">Biblioteca de Ejercicios</a>
  </div>
</nav>

<main id="app">
  <div id="page-biblioteca">
    <div class="page-header">
      <div>
        <div class="page-title">Biblioteca de Ejercicios</div>
        <div class="page-subtitle">// Ejercicios para casa · sin equipo</div>
      </div>
    </div>

    <div class="filter-pills">
      <button class="pill active" data-filter="todos">Todos</button>
      <button class="pill" data-filter="pecho">Pecho</button>
      <button class="pill" data-filter="espalda">Espalda</button>
      <button class="pill" data-filter="piernas">Piernas</button>
      <button class="pill" data-filter="hombros">Hombros</button>
      <button class="pill" data-filter="core">Core</button>
      <button class="pill" data-filter="brazos">Brazos</button>
      <button class="pill" data-filter="cardio">Cardio</button>
    </div>

    <div class="exercise-grid" id="exerciseGrid"></div>
  </div>
</main>

<div id="lightboxOverlay" class="lb-overlay">
  <div class="lb-panel">
    <div class="lb-header">
      <button class="lb-btn-cancel" id="lbCancel">Cancelar</button>
      <span class="lb-header-title">Editar ejercicio</span>
      <button class="lb-btn-save" id="lbSave">Guardar</button>
    </div>

    <div class="lb-body">

      <div class="lb-field">
        <label class="lb-label">Nombre</label>
        <input class="lb-input" id="lbNombre">
      </div>

      <div class="lb-field">
        <label class="lb-label">Descripción</label>
        <textarea class="lb-input" id="lbDescripcion" rows="4"></textarea>
      </div>

      <div class="lb-field">
        <label class="lb-label">Tipo</label>
        <input class="lb-input" id="lbTipo">
      </div>

      <div class="lb-field">
        <label class="lb-label">Equipo</label>
        <input class="lb-input" id="lbEquipo">
      </div>

      <div class="lb-field">
        <label class="lb-label">Músculo primario</label>
        <input class="lb-input" id="lbMusculoPrimario">
      </div>

      <div class="lb-field">
        <label class="lb-label">Músculo secundario</label>
        <input class="lb-input" id="lbMusculoSecundario">
      </div>

      <div class="lb-field">
        <label class="lb-label">Parte del cuerpo</label>
        <input class="lb-input" id="lbParteCuerpo">
      </div>

      <div class="lb-field">
        <label class="lb-label">Unidad</label>
        <input class="lb-input" id="lbUnidad">
      </div>

      <div class="lb-field">
        <label class="lb-label">Video URL</label>
        <input class="lb-input" id="lbVideo">
      </div>

      <div class="lb-field">
        <label class="lb-label">Imagen URL</label>
        <input class="lb-input" id="lbImagen">
      </div>

    </div>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>
<script src="../js/library.js"></script>

</body>
</html>
