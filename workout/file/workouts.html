<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0,
      maximum-scale=1.0
    "
  >

  <title>
    Entrenamientos — Workout
  </title>

  <!-- FONTS -->

  <link rel="preconnect"
    href="https://fonts.googleapis.com">

  <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="
      https://fonts.googleapis.com/css2?
      family=DM+Mono:wght@300;400;500&
      family=DM+Sans:wght@300;400;500;600&
      display=swap
    "
    rel="stylesheet"
  >

  <!-- STYLES -->

  <link rel="stylesheet"
    href="../css/style.css">

  <link rel="stylesheet"
    href="../css/workouts.css">

</head>

<body>

  <!-- TOPBAR -->

  <div id="topbarContainer"></div>

  <!-- MENU -->

  <div id="menuContainer"></div>

  <!-- MAIN -->

  <main id="app">

    <div id="page-workouts">

      <!-- HEADER -->

      <div class="page-header">

        <div>

          <div class="page-title">
            Entrenamientos
          </div>

          <div class="page-subtitle">
            // Ejecuta tus rutinas
          </div>

        </div>

        <a
          class="back-btn"
          href="../index.html"
        >

          ← Volver

        </a>

      </div>

      <!-- ACTIVE WORKOUT -->

      <div
        id="activeWorkoutBox"
        class="active-workout hidden"
      >

        <div class="active-label">
          ENTRENAMIENTO ACTIVO
        </div>

        <div
          id="activeWorkoutName"
          class="active-name"
        >
        </div>

        <button
          id="continueWorkoutBtn"
          class="btn"
        >

          Continuar

        </button>

      </div>

      <!-- ROUTINES -->

      <div
        id="workoutRoutineList"
        class="workout-grid"
      >
      </div>

    </div>

  </main>

  <!-- SCRIPTS -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="../js/app.js"></script>

  <script src="../js/workouts.js"></script>

</body>

</html>
