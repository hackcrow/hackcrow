<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    Entrenamientos — Workout
  </title>

  <!-- FAVICON -->

  <link
    rel="icon"
    href="../src/images/favicon.ico">

  <!-- FONTS -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <!-- GLOBAL CSS -->

  <link
    rel="stylesheet"
    href="../css/style.css">

  <!-- WORKOUTS CSS -->

  <link
    rel="stylesheet"
    href="../css/workouts.css">

</head>

<body>

  <!-- GLOBAL OVERLAY -->

  <div id="overlay"></div>

  <!-- TOPBAR -->

  <div id="topbarContainer"></div>

  <!-- MENU -->

  <div id="menuContainer"></div>

  <!-- MAIN -->

   <main id="app">

      <div id="page-workouts">
    
        <!-- PAGE HEADER -->
    
        <div class="page-header">
    
          <div>
    
            <div class="page-title">
              Entrenamiento
            </div>
    
            <div class="page-subtitle">
              // Selecciona una rutina para entrenar
            </div>
    
          </div>
    
          <div class="action-buttons">
    
            <button
              id="deleteWorkoutBtn"
              class="pill-add-btn"
              title="Eliminar entrenamiento">
    
              <svg
                viewBox="0 0 24 24"
                width="24"
                height="24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round">
    
                <path d="M3 6h18"/>
                <path d="M8 6V4h8v2"/>
                <path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6"/>
                <path d="M14 11v6"/>
    
              </svg>
    
            </button>
    
            <button
              id="addWorkoutBtn"
              class="pill-add-btn"
              title="Nuevo entrenamiento">
    
              +
    
            </button>
    
            <a
              class="back-btn"
              href="../index.html">
    
              ← Volver
    
            </a>
    
          </div>
    
        </div>
    
        <!-- GRID -->
    
        <div id="workoutGrid">
    
          <div class="workout-card">
    
            <div class="workout-name">
              Push Day
            </div>
    
            <div class="workout-description">
              Pecho, hombros y tríceps.
            </div>
    
            <div class="workout-footer">
    
              <span>6 ejercicios</span>
    
              <span>45 min</span>
    
            </div>
    
          </div>
    
        </div>
    
      </div>
    
    </main>

  <!-- CREATE WORKOUT LIGHTBOX -->

<div
  id="workoutLightbox"
  class="lightbox-overlay">

  <div class="lightbox-card">

    <div class="lightbox-header">

      <h2>
        Nuevo Entrenamiento
      </h2>

    </div>

    <div class="lightbox-body">

      <input
        id="wkNombre"
        type="text"
        placeholder="Nombre del entrenamiento">

      <textarea
        id="wkDescripcion"
        placeholder="Descripción"></textarea>

    </div>

    <div class="lightbox-actions">

          <button
            id="wkCancel"
            class="btn btn-ghost">
    
            Cancelar
    
          </button>
    
          <button
            id="wkSave"
            class="btn">
    
            Guardar
    
          </button>
    
        </div>
    
      </div>
    
    </div>

  <!-- PROGRAMS OVERLAY -->

    <div
      id="programsOverlay"
      class="lightbox-overlay">
    
      <div class="lightbox-card">
    
        <div class="lightbox-header">
    
          <h2 id="programsTitle">
    
            Programas
    
          </h2>
    
        </div>
    
        <div
          id="programsList">
    
        </div>
    
        <button
          id="addProgramBtn"
          class="btn btn-ghost">
    
          + Agregar Programa
    
        </button>
    
        <div class="lightbox-actions">
    
          <button
            id="closeProgramsBtn"
            class="btn btn-ghost">
    
            Cerrar
    
          </button>
    
        </div>
    
      </div>
    
    </div>

  <!-- SCRIPTS -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="../js/app.js"></script>

  <script src="../js/workouts.js"></script>

</body>

</html>
