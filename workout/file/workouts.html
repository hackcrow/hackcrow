<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    Entrenamientos — Workout
  </title>

  <!-- FAVICON -->

  <link
    rel="icon"
    href="../src/images/favicon.ico">

  <!-- FONTS -->

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <!-- GLOBAL CSS -->

  <link
    rel="stylesheet"
    href="../css/style.css">

  <!-- WORKOUTS CSS -->

  <link
    rel="stylesheet"
    href="../css/workouts.css">

</head>

<body>

  <!-- GLOBAL OVERLAY -->

  <div id="overlay"></div>

  <!-- TOPBAR -->

  <div id="topbarContainer"></div>

  <!-- MENU -->

  <div id="menuContainer"></div>

  <!-- MAIN -->

   <main id="app">
  
    <div id="page-workouts">
  
      <!-- PAGE HEADER -->
  
      <div class="header-actions">

        <button
          id="deleteWorkoutBtn"
          class="delete-ex-btn"
          title="Eliminar Entrenamiento">
      
          🗑
      
        </button>
      
        <button
          id="addWorkoutBtn"
          class="add-ex-btn"
          title="Nuevo Entrenamiento">
      
          ＋
      
        </button>
      
        <a
          class="back-btn"
          href="../index.html">
      
          ← Volver
      
        </a>
      
      </div>
  
      <!-- GRID -->
  
      <div id="workoutGrid">
  
        <div class="workout-card">
  
          <div class="workout-name">
            Push Day
          </div>
  
          <div class="workout-description">
            Pecho, hombros y tríceps.
          </div>
  
          <div class="workout-footer">
  
            <span>
              6 ejercicios
            </span>
  
            <span>
              45 min
            </span>
  
          </div>
  
        </div>
  
        <div class="workout-card">
  
          <div class="workout-name">
            Pull Day
          </div>
  
          <div class="workout-description">
            Espalda y bíceps.
          </div>
  
          <div class="workout-footer">
  
            <span>
              5 ejercicios
            </span>
  
            <span>
              40 min
            </span>
  
          </div>
  
        </div>
  
        <div class="workout-card">
  
          <div class="workout-name">
            Leg Day
          </div>
  
          <div class="workout-description">
            Cuádriceps, femorales y pantorrillas.
          </div>
  
          <div class="workout-footer">
  
            <span>
              7 ejercicios
            </span>
  
            <span>
              55 min
            </span>
  
          </div>
  
        </div>
  
      </div>
  
    </div>
  
  </main>
  

  <!-- SCRIPTS -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="../js/app.js"></script>

  <script src="../js/programs.js"></script>

</body>

</html>
