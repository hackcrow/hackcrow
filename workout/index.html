<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#00ff88;
  --accent-dim:rgba(0,255,136,0.12);
  --accent-border:rgba(0,255,136,0.25);
  --bg:#0a0a0a;
  --bg2:#111;
  --bg3:#1a1a1a;
  --border:rgba(255,255,255,0.07);
  --text:#f0f0f0;
  --text-muted:#777;
  --radius:14px;
  --radius-sm:8px;
  --font-mono:'DM Mono', monospace;
  --font-sans:'DM Sans', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font-sans);
  background:var(--bg);
  color:var(--text);
}
.version{
  text-align:center;
  font-family:var(--font-mono);
  font-size:.7rem;
  color:var(--accent);
  padding:10px 0 4px;
  letter-spacing:2px;
}
#topbar{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  border-bottom:1px solid var(--border);
}
.logo{
  font-family:var(--font-mono);
  letter-spacing:3px;
}
.logo span{color:var(--accent)}
.hero{
  max-width:900px;
  margin:auto;
  padding:40px 24px 28px;
}
.greeting{
  font-family:var(--font-mono);
  font-size:.72rem;
  color:var(--accent);
  margin-bottom:10px;
}
.hero-title{
  font-size:clamp(1.8rem,5vw,2.8rem);
  font-weight:300;
}
.dashboard{
  max-width:900px;
  margin:auto;
  padding:0 24px 40px;
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:14px;
}
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
}
.card-third{grid-column:span 4}
.card-half{grid-column:span 6}
.card-label{
  font-family:var(--font-mono);
  font-size:.65rem;
  color:var(--text-muted);
  margin-bottom:14px;
}
.card-value{
  font-size:2rem;
  font-weight:600;
}
.btn{
  display:inline-block;
  margin-top:16px;
  padding:10px 18px;
  border-radius:8px;
  text-decoration:none;
  background:var(--accent);
  color:#000;
  font-weight:600;
}
@media(max-width:640px){
  .card-third,.card-half{grid-column:span 12}
}
</style>
</head>
<body>

<div class="version">version 2</div>

<header id="topbar">
  <div class="logo">Work<span>out</span></div>
</header>

<section class="hero">
  <div class="greeting">// sistema activo</div>
  <h1 class="hero-title">Hola, <strong>Atleta</strong>.<br>¿Listo para entrenar?</h1>
</section>

<div class="dashboard">

  <div class="card card-third">
    <div class="card-label">Racha actual</div>
    <div class="card-value">0 días</div>
  </div>

  <div class="card card-third">
    <div class="card-label">Esta semana</div>
    <div class="card-value">0 sesiones</div>
  </div>

  <div class="card card-third">
    <div class="card-label">Ejercicios registrados</div>
    <div class="card-value">22</div>
    <a class="btn" href="library.html">Ver biblioteca</a>
  </div>

  <div class="card card-half">
    <div class="card-label">Acceso rápido</div>
    <a class="btn" href="library.html">Ir a Biblioteca →</a>
  </div>

  <div class="card card-half">
    <div class="card-label">Empezar ahora</div>
    <a class="btn" href="library.html">Abrir biblioteca →</a>
  </div>

</div>

</body>
</html>
